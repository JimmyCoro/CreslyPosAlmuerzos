{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1f2937">
  <title>Cresly POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'CSS/base.css' %}">
  <link rel="stylesheet" href="{% static 'CSS/inicio.css' %}">
  <link rel="stylesheet" href="{% static 'CSS/menu-conf.css' %}">
  <link rel="stylesheet" href="{% static 'CSS/tomar-pedido.css' %}">
  <link rel="stylesheet" href="{% static 'CSS/caja.css' %}">
  <link rel="stylesheet" href="{% static 'CSS/agregar-producto.css' %}">
  <link rel="manifest" href="{% static 'manifest.json' %}">
  <link rel="icon" href="{% static 'icons/icon-192.png' %}">
  <link rel="apple-touch-icon" href="{% static 'icons/icon-192.png' %}">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  {% block styles %}
  {% endblock %}
  {% block extra_css %}
  {% endblock %}

  <style>
    /* Sidebar icon-only: tablet horizontal (768px–1439px landscape) */
    @media (min-width: 768px) and (max-width: 1439px) and (orientation: landscape) {
      /* Resetear el modo "panel deslizable" de max-width:1023px */
      .sidebar {
        position: relative !important;
        transform: none !important;
        height: 100vh !important;
        width: 72px !important;
        min-width: 72px !important;
        padding: 1.25rem 0.4rem;
        align-items: center;
        overflow: hidden;
        box-shadow: none !important;
        z-index: auto !important;
      }
      .sidebar-overlay { display: none !important; }
      .sidebar-close-btn { display: none !important; }
      .main-content { width: calc(100% - 72px) !important; }

      .sidebar-brand .brand-text,
      .sidebar-section-label,
      .sidebar-user .user-details { display: none !important; }
      .sidebar-brand { justify-content: center; margin-bottom: 1.25rem; }

      /* Link en columna: icono + label */
      .sidebar-link {
        flex-direction: column !important;
        justify-content: center !important;
        align-items: center !important;
        padding: 0.5rem 0.2rem !important;
        gap: 2px !important;
      }
      .sidebar-icon { font-size: 1.2rem; margin: 0; }

      /* Label pequeño debajo del icono */
      .sidebar-link span:not(.sidebar-active-dot) {
        display: block !important;
        font-size: 0.62rem !important;
        line-height: 1.1;
        text-align: center;
        width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #9ca3af;
      }
      .sidebar-link.sidebar-active span:not(.sidebar-active-dot) { color: #e5e7eb; }

      .sidebar-user { justify-content: center; }
      .sidebar-toggle { display: none !important; }

      /* Grupo "Almuerzos": sin indentación en el rail angosto de 72px;
         el toggle sigue funcionando igual (icono + label + chevron apilados) */
      .sidebar-group {
        margin: 0;
        padding-left: 0;
        border-left: none;
      }
    }
  </style>
</head>

<body>
  <!-- Overlay para cerrar sidebar en móvil/tablet -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="app-layout">
    <aside class="sidebar" id="mainSidebar">
      {% include 'components/navbar.html' %}
    </aside>

    <div class="main-content">
      {% block content %}
      {% endblock %}
      {% if request.path != '/' %}
      {% include 'components/bottom_nav.html' with global_nav=True %}
      {% endif %}
    </div>
  </div>

  <!-- jQuery (requerido por Select2) -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  <script>
    window.CSRF_TOKEN = "{{ csrf_token }}";
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="{% static 'JS/inicio.js' %}"></script>

  <script>
    // ===== SIDEBAR RESPONSIVE =====
    const sidebarToggle = document.getElementById('sidebarToggle');
    const mainSidebar = document.getElementById('mainSidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    function openSidebar() {
      mainSidebar.classList.add('sidebar-open');
      sidebarOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeSidebar() {
      mainSidebar.classList.remove('sidebar-open');
      sidebarOverlay.classList.remove('active');
      document.body.style.overflow = '';
    }

    if (sidebarToggle) {
      sidebarToggle.addEventListener('click', function () {
        mainSidebar.classList.contains('sidebar-open') ? closeSidebar() : openSidebar();
      });
    }

    sidebarOverlay.addEventListener('click', closeSidebar);

    // Cierra el sidebar al navegar en móvil (excepto el toggle de grupos,
    // que solo expande/colapsa y no debe cerrar el panel deslizable)
    document.querySelectorAll('.sidebar-link:not(.sidebar-group-toggle)').forEach(function (link) {
      link.addEventListener('click', function () {
        if (window.innerWidth <= 1024) closeSidebar();
      });
    });

    // ===== FECHA Y HORA EN TOPBAR =====
    function updateDateTime() {
      const now = new Date();
      const dateEl = document.getElementById('topbarDate');
      const timeEl = document.getElementById('topbarTime');
      if (dateEl) {
        dateEl.textContent = now.toLocaleDateString('es-ES', {
          weekday: 'long', day: 'numeric', month: 'long',
          timeZone: 'America/Guayaquil'
        });
      }
      if (timeEl) {
        timeEl.textContent = now.toLocaleTimeString('es-ES', {
          hour: '2-digit', minute: '2-digit', hour12: true,
          timeZone: 'America/Guayaquil'
        });
      }
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('{% static "sw.js" %}')
          .catch(err => console.error('SW registration failed', err));
      });
    }
  </script>

  <script>
    // En tablet vertical/celulares (≤1023px), el navbar inferior (.page-header)
    // se mueve al final de <body> para que su position:fixed quede libre de
    // cualquier overflow:hidden de los contenedores padres y se pegue de
    // verdad al borde inferior real de la pantalla. Los botones conservan
    // sus mismos id/listeners, solo cambia dónde vive el nodo en el DOM.
    // Corre en cualquier página (Pedidos, Caja, Menú del día).
    (function () {
      var header = document.querySelector('.page-header');
      if (!header) return;

      var originalParent = header.parentNode;
      var originalNextSibling = header.nextSibling;
      var enBody = false;

      function actualizarPosicion() {
        var esAngosto = window.innerWidth <= 1023;
        if (esAngosto && !enBody) {
          document.body.appendChild(header);
          enBody = true;
        } else if (!esAngosto && enBody) {
          originalParent.insertBefore(header, originalNextSibling);
          enBody = false;
        }
      }

      actualizarPosicion();
      window.addEventListener('resize', actualizarPosicion);
    })();
  </script>
</body>

</html>
